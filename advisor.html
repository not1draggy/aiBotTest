<style>
:root {
  --green:#1a6b3c;--green-dark:#145530;--green-light:#f0f7f3;--green-border:#c2ddd0;
  --surface:#f5f6f5;--border:#e0e2e0;--text:#1a1c1a;--text-mid:#4a524d;--text-soft:#6e7870;--text-xsoft:#9da89f;
  --white:#ffffff;--shadow:0 4px 24px rgba(0,0,0,0.08);--shadow-lg:0 16px 48px rgba(0,0,0,0.13);
  --font:'DM Sans',-apple-system,sans-serif;--mono:'DM Mono',monospace;
  --radius:12px;--radius-sm:8px;--radius-lg:18px;--header-h:56px;
  --chat-max:680px;--transition:.2s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--surface);color:var(--text);height:100dvh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow:hidden}

/* ── HEADER ── */
.hdr{height:var(--header-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;position:relative;z-index:10}
.hdr-logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--green);font-family:var(--mono);font-size:15px;font-weight:500}
.hdr-logo-box{width:30px;height:30px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center}
.hdr-logo-box svg{width:16px;height:16px}
.hdr-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px}
.hdr-badge{background:var(--green-light);border:1px solid var(--green-border);color:var(--green);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;letter-spacing:0.02em}
.hdr-badge::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.hdr-right{display:flex;align-items:center;gap:8px}
.lang-btn{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-family:var(--font);font-size:12.5px;font-weight:600;color:var(--text-mid);transition:all var(--transition)}
.lang-btn:hover{border-color:var(--green);color:var(--green)}
.lang-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow);z-index:200;min-width:155px;overflow:hidden;display:none}
.lang-dropdown.open{display:block}
.lang-opt{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:13px;color:var(--text-mid);cursor:pointer;border:none;background:none;width:100%;font-family:var(--font);transition:background var(--transition)}
.lang-opt:hover,.lang-opt.active{background:var(--green-light);color:var(--green);font-weight:600}
.btn-back{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text-mid);text-decoration:none;transition:all var(--transition)}
.btn-back:hover{border-color:var(--green);color:var(--green)}

/* ── CHAT AREA ── */
.chat-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;align-items:center;padding:0 16px}
.chat-inner{width:100%;max-width:var(--chat-max);flex:1;overflow-y:auto;padding:24px 0 16px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.chat-inner::-webkit-scrollbar{width:4px}
.chat-inner::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

/* ── MESSAGES ── */
.msg{display:flex;gap:10px;align-items:flex-end;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start;max-width:88%}
.msg.user{align-self:flex-end;flex-direction:row-reverse;max-width:80%}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px}
.bot .msg-avatar{background:var(--green);color:var(--white)}
.user .msg-avatar{background:var(--text);color:var(--white);font-size:12px;font-weight:700}
.msg-bubble{padding:12px 16px;border-radius:var(--radius-lg);font-size:14px;line-height:1.6;word-break:break-word}
.bot .msg-bubble{background:var(--white);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.user .msg-bubble{background:var(--green);color:var(--white);border-bottom-right-radius:4px}
.msg-bubble p{margin-bottom:8px}
.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble strong{font-weight:600}

/* ── TYPING INDICATOR ── */
.typing{display:flex;gap:5px;align-items:center;padding:14px 16px}
.typing span{width:7px;height:7px;background:var(--text-xsoft);border-radius:50%;animation:typing 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── QUICK REPLIES ── */

.qr-btn{padding:8px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid var(--green-border);color:var(--green);background:var(--green-light);cursor:pointer;font-family:var(--font);transition:all var(--transition);white-space:nowrap}
.qr-btn:hover{background:var(--green);color:var(--white);border-color:var(--green)}
.qr-btn:disabled{opacity:0.4;pointer-events:none}

/* ── LISTING CARDS in chat ── */
.chat-listings{display:flex;flex-direction:column;gap:8px;margin-top:4px;width:100%}
.chat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;gap:0;cursor:pointer;transition:border-color var(--transition),box-shadow var(--transition);text-decoration:none;color:inherit}
.chat-card:hover{border-color:var(--green-border);box-shadow:var(--shadow)}
.chat-card-img{width:100px;flex-shrink:0;background:var(--green-light);position:relative;min-height:80px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.chat-card-img img{width:100%;height:100%;object-fit:cover}
.chat-card-body{flex:1;padding:10px 12px;min-width:0}
.chat-card-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.chat-card-meta{font-size:11.5px;color:var(--text-soft)}

/* ── INPUT ── */

/* ══════════════════════════════════════════════
   LANGUAGE SWITCHER
══════════════════════════════════════════════ */
const LangSwitcher = (() => {
  const LANGS = [
    {code:'sk',label:'SK',flag:'🇸🇰',name:'Slovenčina'},
    {code:'en',label:'EN',flag:'🇬🇧',name:'English'},
    {code:'de',label:'DE',flag:'🇩🇪',name:'Deutsch'},
    {code:'ru',label:'RU',flag:'🇷🇺',name:'Русский'},
    {code:'uk',label:'UK',flag:'🇺🇦',name:'Українська'},
  ];
  let current = 'sk';

  function init() {
    // Načítaj jazyk z localStorage (synchronizácia s hlavnou stránkou)
    const saved = localStorage.getItem('484_lang');
    if (saved && LANGS.find(l=>l.code===saved)) current = saved;
    const dd = document.getElementById('langDropdown');
    LANGS.forEach(lang => {
      const btn = document.createElement('button');
      btn.className = 'lang-opt' + (lang.code===current?' active':'');
      btn.innerHTML = `<span>${lang.flag}</span><span>${lang.name}</span>`;
      btn.onclick = () => set(lang);
      dd.appendChild(btn);
    });
    updateUI();
    document.addEventListener('click', e => {
      if (!e.target.closest('.hdr-right')) dd.classList.remove('open');
    });
  }

  function toggle() { document.getElementById('langDropdown').classList.toggle('open'); }

  function set(lang) {
    current = lang.code;
    localStorage.setItem('484_lang', lang.code);
    document.getElementById('langFlag').textContent = lang.flag;
    document.getElementById('langCode').textContent = lang.label;
    document.getElementById('langDropdown').classList.remove('open');
    document.querySelectorAll('.lang-opt').forEach((b,i) => b.classList.toggle('active', LANGS[i].code===lang.code));
    updateUI();
  }

  function updateUI() {
    const l = current;
    document.getElementById('langBtn').title = LANGS.find(x=>x.code===l)?.name;
    const el = document.getElementById('langFlag');
    const lobj = LANGS.find(x=>x.code===l);
    if (el && lobj) el.textContent = lobj.flag;
    const ce = document.getElementById('langCode');
    if (ce && lobj) ce.textContent = lobj.label;
  }

  function get() { return current; }
  return { init, toggle, get };
})();

══════════════════════════════════════════════ */
async function loadListings() {
  const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/inzeraty?select=*&aktivny=eq.true&order=created_at.desc`, {
    headers: { 'apikey': CONFIG.SUPABASE_ANON, 'Authorization': `Bearer ${CONFIG.SUPABASE_ANON}` }
  });
  if (!res.ok) return [];
  return res.json();
}

};

function t(key, ...args) {
  const lang = LangSwitcher.get();
  const dict = T[lang] || T.sk;
  const val = dict[key];
  return typeof val === 'function' ? val(...args) : (val || T.sk[key] || key);
}

/* ══════════════════════════════════════════════
   CHAT ENGINE
══════════════════════════════════════════════ */
const Chat = (() => {
  let listings = [];
  let context = {}; // user answers
  let step = 'start';
  let isTyping = false;
  let history = []; // for Anthropic API

  const SYSTEM_PROMPT = () => `Si AI poradca pre nehnuteľnosti na webe 484.sk. Stránka predáva nehnuteľnosti priamo od majiteľa, bez realitnej kancelárie, bez provízií. Primárne ponúka rodinné domy v Mokranciach, Košický kraj, Slovensko.

Tvoja úloha:
1. Zistiť potreby používateľa (veľkosť rodiny, deti, rozpočet, priority)
2. Odporučiť vhodné nehnuteľnosti z databázy
3. Byť priateľský, stručný, konkrétny — max 2-3 vety na správu
4. Písať v jazyku: ${LangSwitcher.get()}
5. NIKDY nevymýšľaj nehnuteľnosti — pracuj len s tými čo ti dám

Dostupné nehnuteľnosti:
${listings.map(l => `- ID:${l.id} | ${l.nazov} | ${Number(l.cena).toLocaleString('sk')} € | ${l.obec}, ${l.kraj} | ${l.typ} | ${l.uzitk_plocha||'?'} m² | ${l.stav||''} | ${l.energy_class||''}`).join('\n')}

Kontext používateľa: ${JSON.stringify(context)}

Keď odporúčaš nehnuteľnosti, uveď ich ID-čka vo formáte [IDs:1,2,3] na konci správy.`;

  function fmt(n) { return Number(n).toLocaleString('sk') + ' €'; }

  function scrollToBottom() {
    const el = document.getElementById('chatInner');
    requestAnimationFrame(() => el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' }));
  }

  function addMessage(role, content, quickReplies = [], cards = []) {
    const el = document.getElementById('chatInner');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'bot' ? '🏠' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    // Markdown-lite: bold + newlines
    const html = content
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
    bubble.innerHTML = `<p>${html}</p>`;

    // Quick replies
    if (quickReplies.length) {
      const qr = document.createElement('div');
      qr.className = 'quick-replies';
      quickReplies.forEach(label => {
        const btn = document.createElement('button');
        btn.className = 'qr-btn';
        btn.textContent = label;
        btn.onclick = () => {
          // Disable all QR buttons
          qr.querySelectorAll('.qr-btn').forEach(b => b.disabled = true);
          handleUserInput(label);
        };
        qr.appendChild(btn);
      });
      bubble.appendChild(qr);
    }

    // Listing cards
    if (cards.length) {
      const cardWrap = document.createElement('div');
      cardWrap.className = 'chat-listings';
      cards.forEach(item => {
        const img = Array.isArray(item.foto_urls) && item.foto_urls[0]
          ? `<img src="${item.foto_urls[0]}" alt="${item.nazov}" loading="lazy">`
          : `<span style="font-size:28px;opacity:0.4">🏠</span>`;
        const card = document.createElement('a');
        card.className = 'chat-card';
        card.href = `index.html#listing-${item.id}`;
        card.target = '_blank';
        card.innerHTML = `
          <div class="chat-card-img">${img}</div>
          <div class="chat-card-body">
            <div class="chat-card-title">${item.nazov}</div>
            <div class="chat-card-meta">${item.obec} · ${item.uzitk_plocha ? item.uzitk_plocha + ' m²' : ''}</div>
            <div class="chat-card-price">${fmt(item.cena)}</div>
          </div>`;
        cardWrap.appendChild(card);
      });
      // CTA buttons
      const ctaWrap = document.createElement('div');
      ctaWrap.className = 'chat-cta-wrap';
      const ctaAll = document.createElement('a');
      ctaAll.className = 'chat-cta';
      ctaAll.href = 'index.html';
      ctaAll.innerHTML = t('ctaAll');
      ctaWrap.appendChild(ctaAll);
      bubble.appendChild(cardWrap);
      bubble.appendChild(ctaWrap);
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    el.appendChild(div);

    // Reset button after results
    if (cards.length) {
      const resetDiv = document.createElement('div');
      resetDiv.style.cssText = 'display:flex;justify-content:center;padding:4px 0';
      const rb = document.createElement('button');
      rb.className = 'reset-btn';
      rb.textContent = t('reset');
      rb.onclick = restart;
      resetDiv.appendChild(rb);
      el.appendChild(resetDiv);
    }

    history.push({ role: role === 'bot' ? 'assistant' : 'user', content });
    scrollToBottom();
  }

  function showTyping() {
    isTyping = true;
    const el = document.getElementById('chatInner');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typingIndicator';
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '🏠';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    div.appendChild(avatar);
    div.appendChild(bubble);
    el.appendChild(div);
    scrollToBottom();
  }

  function hideTyping() {
    isTyping = false;
    document.getElementById('typingIndicator')?.remove();
  }

  async function askAI(userMsg) {
    showTyping();
    document.getElementById('sendBtn').disabled = true;

    history.push({ role: 'user', content: userMsg });

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT(),
          messages: history.filter(m => m.role !== 'assistant' || m.content).slice(-10),
        }),
      });

      const data = await res.json();
      const raw = data.content?.[0]?.text || '';

      // Parsuj odporúčané ID-čka
      const idMatch = raw.match(/\[IDs:([\d,\s]+)\]/);
      const cleanText = raw.replace(/\[IDs:[\d,\s]+\]/g, '').trim();
      let cards = [];
      if (idMatch) {
        const ids = idMatch[1].split(',').map(x => parseInt(x.trim())).filter(Boolean);
        cards = listings.filter(l => ids.includes(l.id));
      }

      hideTyping();
      addMessage('bot', cleanText, [], cards);

    } catch (err) {
      hideTyping();
      addMessage('bot', 'Oops, nastala chyba. Skúste to znova.');
      console.error(err);
    } finally {
      document.getElementById('sendBtn').disabled = false;
    }
  }

  async function handleUserInput(text) {
    if (!text.trim()) return;
    addMessage('user', text);
    document.getElementById('inputBox').value = '';
    autoResize();

    // Update context based on step
    if (step === 'start') {
      context.people = text;
      step = 'children';
      setTimeout(() => addMessage('bot', t('askChildren'), t('quickReplies_children')), 600);
    } else if (step === 'children') {
      context.children = text;
      step = 'budget';
      setTimeout(() => addMessage('bot', t('askBudget'), t('quickReplies_budget')), 600);
    } else if (step === 'budget') {
      context.budget = text;
      step = 'priority';
      setTimeout(() => addMessage('bot', t('askPriority'), t('quickReplies_priority')), 600);
    } else if (step === 'priority') {
      context.priority = text;
      step = 'type';
      setTimeout(() => addMessage('bot', t('askType'), t('quickReplies_type')), 600);
    } else if (step === 'type') {
      context.type = text;
      step = 'ai';
      // Zostavíme súhrn pre AI
      const summary = `Hľadám nehnuteľnosť. Počet osôb: ${context.people}. Deti: ${context.children}. Rozpočet: ${context.budget}. Priorita: ${context.priority}. Typ: ${context.type}.`;
      await askAI(summary);
    } else {
      // Voľný chat s AI
      await askAI(text);
    }
  }

  function autoResize() {
    const box = document.getElementById('inputBox');
    box.style.height = 'auto';
    box.style.height = Math.min(box.scrollHeight, 120) + 'px';
  }

  function restart() {
    context = {};
    step = 'start';
    history = [];
    document.getElementById('chatInner').innerHTML = '';
    setTimeout(start, 300);
  }

  function start() {
    addMessage('bot', t('welcome'), t('quickReplies_start'));
  }

  async function init() {
    LangSwitcher.init();
    listings = await loadListings();

    const box = document.getElementById('inputBox');
    box.placeholder = t('placeholder');
    box.addEventListener('input', autoResize);
    box.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    start();
  }

  function send() {
    const text = document.getElementById('inputBox').value.trim();
    if (!text || isTyping) return;
    handleUserInput(text);
  }

  return { init, send, restart };
})();

document.addEventListener('DOMContentLoaded', Chat.init);
</script>
</body>
</html>
